apiVersion: gateway.k8s.aws/v1beta1
kind: LoadBalancerConfiguration
metadata:
  name: {{ .Values.gateway.name }}-lbconfig
  namespace: {{ .Release.Namespace }}
spec:
  scheme: internet-facing
  ipAddressType: ipv4
  loadBalancerSubnetsSelector:
    "kubernetes.io/role/elb": ["1"]
  listenerConfigurations:
    - protocolPort: "HTTP:80"
    - protocolPort: "HTTPS:443"
      certificates: {{ toYaml .Values.gateway.certificateArns | nindent 8 }}
      sslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gatewayClass.name }}
spec:
  controllerName: {{ .Values.gatewayClass.controllerName | quote }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: {{ .Values.gatewayClass.name }}
  infrastructure:
    parametersRef:
      group: gateway.k8s.aws
      kind: LoadBalancerConfiguration
      name: {{ printf "%s-lbconfig" .Values.gateway.name }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: argocd-tls
            group: ""
