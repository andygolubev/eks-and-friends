{{- range $poolName, $pool := .Values.pools }}
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: bottlerocket-{{ $poolName }}
spec:
  amiFamily: Bottlerocket
  amiSelectorTerms:
    - alias: bottlerocket@latest
  role: {{ $.Values.nodeRole | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ $.Values.clusterName | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ $.Values.clusterName | quote }}
  tags:
    karpenter.sh/discovery: {{ $.Values.clusterName | quote }}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ $poolName }}
spec:
  {{- with index $pool "weight" }}
  weight: {{ . }}
  {{- end }}
  {{- if gt (len (index $pool "limits")) 0 }}
  limits:
{{ toYaml (index $pool "limits") | nindent 4 }}
  {{- end }}
  disruption:
    consolidateAfter: 5m
    consolidationPolicy: WhenEmptyOrUnderutilized
  {{- if gt (len (index $pool "labels")) 0 }}
  template:
    metadata:
      labels:
{{ toYaml (index $pool "labels") | nindent 8 }}
    spec:
  {{- else }}
  template:
    spec:
  {{- end }}
      expireAfter: 720h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: bottlerocket-{{ $poolName }}
      {{- if gt (len (index $pool "taints")) 0 }}
      taints:
{{ toYaml (index $pool "taints") | nindent 8 }}
      {{- end }}
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - {{ index $pool "kubernetes_arch" | quote }}
        - key: kubernetes.io/os
          operator: In
          values:
            - linux
        - key: karpenter.sh/capacity-type
          operator: In
          values:
{{ toYaml (index $pool "capacity_types") | nindent 12 }}
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
{{ toYaml (index $pool "instance_types") | nindent 12 }}
---
{{- end }}
